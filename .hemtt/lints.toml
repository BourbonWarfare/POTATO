[config.file_type]
options.allow_no_extension = true

[stringtables.usage]
options.ignore_unused = true

[sqf]
enabled = true

[sqf.banned_macros]
options.release = [
    "DISABLE_COMPILE_CACHE", "ENABLE_PERFORMANCE_COUNTERS" #"DEBUG_MODE_FULL",
]

[sqf.var_all_caps]
enabled = true
options.ignore = [
    "ACRE_CORE_INIT", "ACRE_DATA_SYNCED", "ACRE_MAP_LOADED", "ACRE_IS_SPECTATOR", "ACRE_SPECTATOR_RADIOS", "ACRE_ACTIVE_RADIO", "ACRE_EXTERNALLY_USED_PERSONAL_RADIOS", "ACRE_EXTERNALLY_USED_MANPACK_RADIOS", "ACRE_ACTIVE_EXTERNAL_RADIOS", "ACRE_HEARABLE_RACK_RADIOS", "ACRE_SPECTATORS_LIST", "ACRE_ACCESSIBLE_RACK_RADIOS", "ACE_RECOMPILE", "ACE_RECOMPILES", "ACE_PFH_COUNTER"
]

[sqf.banned_commands]
options.ignore = [
    "addPublicVariableEventHandler", # Alternate syntax doesn't work, used in markers post init
]

[sqf.undefined]
enabled = true
options.check_orphan_code = true

[sqf.unused]
#enabled = true #many false positives without DEBUG_MODE_FULL
options.check_params = false

[sqf.shadowed]
enabled = false

[sqf.not_private]
enabled = true
